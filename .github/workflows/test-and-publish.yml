name: Test, Publish Image, and Release Binaries

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run tests
      run: go test -v ./...

    - name: Build binary
      run: go build -ldflags="-s -w" -o ytdm .

  publish-image:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set image name
      id: image
      run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ytdm" >> "$GITHUB_OUTPUT"

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.image.outputs.name }}:latest
        build-args: |
          GIT_COMMIT=${{ github.sha }}

  build-binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
        - goos: linux
          goarch: amd64
          binary_name: ytdm
          archive_name: ytdm-linux-amd64.tar.gz
        - goos: linux
          goarch: arm64
          binary_name: ytdm
          archive_name: ytdm-linux-arm64.tar.gz
        - goos: windows
          goarch: amd64
          binary_name: ytdm.exe
          archive_name: ytdm-windows-amd64.zip
        - goos: windows
          goarch: arm64
          binary_name: ytdm.exe
          archive_name: ytdm-windows-arm64.zip
        - goos: darwin
          goarch: amd64
          binary_name: ytdm
          archive_name: ytdm-darwin-amd64.tar.gz
        - goos: darwin
          goarch: arm64
          binary_name: ytdm
          archive_name: ytdm-darwin-arm64.tar.gz
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build binary
      env:
        CGO_ENABLED: 0
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        mkdir -p dist
        go build -trimpath -ldflags "-s -w -X main.gitCommit=${{ github.sha }}" -o "dist/${{ matrix.binary_name }}" .

    - name: Package archive
      working-directory: dist
      run: |
        if [ "${{ matrix.goos }}" = "windows" ]; then
          zip -j "${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
        else
          tar -czf "${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
        fi

    - name: Upload release asset
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/${{ matrix.archive_name }}
        if-no-files-found: error

  publish-release:
    name: Publish latest GitHub release
    runs-on: ubuntu-latest
    needs:
    - publish-image
    - build-binaries
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download release assets
      uses: actions/download-artifact@v4
      with:
        pattern: release-*
        path: release-assets
        merge-multiple: true

    - name: Move latest tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag -fa latest -m "Latest release" "${GITHUB_SHA}"
        git push origin refs/tags/latest --force

    - name: Publish rolling release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest
        body: |
          Rolling release for the latest successful push to ${{ github.ref_name }}.

          Commit: `${{ github.sha }}`
        files: release-assets/*
        fail_on_unmatched_files: true
        overwrite_files: true
